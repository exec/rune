name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux targets
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: rune-linux-x86_64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest  
            name: rune-linux-x86_64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: rune-linux-aarch64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: rune-linux-aarch64-musl
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            name: rune-linux-armv7
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            name: rune-linux-i686
          
          # FreeBSD
          - target: x86_64-unknown-freebsd
            os: ubuntu-latest
            name: rune-freebsd-x86_64
            
          # NetBSD
          - target: x86_64-unknown-netbsd
            os: ubuntu-latest
            name: rune-netbsd-x86_64
            
          # macOS (required for Homebrew)
          - target: x86_64-apple-darwin
            os: macos-latest
            name: rune-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: rune-macos-aarch64

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross-compilation tools
      if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
      run: |
        cargo install cross --git https://github.com/cross-rs/cross

    - name: Build with cross
      if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
      run: |
        cross build --release --target ${{ matrix.target }}

    - name: Build native
      if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.os == 'macos-latest'
      run: |
        cargo build --release --target ${{ matrix.target }}

    - name: Package binary
      run: |
        mkdir -p dist
        cp target/${{ matrix.target }}/release/rune dist/
        cd dist
        tar -czf ${{ matrix.name }}.tar.gz rune
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: dist/${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/*/*.tar.gz
        body: |
          ## Changes
          
          See [CHANGELOG.md](CHANGELOG.md) for details.
          
          ## Installation
          
          ### Linux/Unix Binary
          Download the appropriate binary for your platform and extract:
          ```bash
          tar -xzf rune-linux-x86_64.tar.gz
          sudo mv rune /usr/local/bin/
          ```
          
          ### From Source
          ```bash
          cargo install --git https://github.com/exec/rune
          ```
          
          ### Homebrew (macOS/Linux)
          The homebrew formula is automatically updated with each release:
          ```bash
          brew tap exec/rune
          brew install rune-editor
          ```
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Download release assets and calculate SHA256
      id: calculate-sha
      run: |
        # Download the macOS and Linux binaries we need for Homebrew
        curl -sL https://github.com/exec/rune/releases/download/${{ github.ref_name }}/rune-macos-x86_64.tar.gz -o macos-x86_64.tar.gz
        curl -sL https://github.com/exec/rune/releases/download/${{ github.ref_name }}/rune-macos-aarch64.tar.gz -o macos-aarch64.tar.gz
        curl -sL https://github.com/exec/rune/releases/download/${{ github.ref_name }}/rune-linux-x86_64.tar.gz -o linux-x86_64.tar.gz
        curl -sL https://github.com/exec/rune/releases/download/${{ github.ref_name }}/rune-linux-aarch64.tar.gz -o linux-aarch64.tar.gz
        
        # Calculate SHA256 hashes
        echo "MACOS_X86_64_SHA=$(shasum -a 256 macos-x86_64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
        echo "MACOS_AARCH64_SHA=$(shasum -a 256 macos-aarch64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
        echo "LINUX_X86_64_SHA=$(shasum -a 256 linux-x86_64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
        echo "LINUX_AARCH64_SHA=$(shasum -a 256 linux-aarch64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
        
    - name: Checkout homebrew-rune repository
      uses: actions/checkout@v4
      with:
        repository: exec/homebrew-rune
        token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        path: homebrew-rune
        
    - name: Update formula
      run: |
        cd homebrew-rune
        cat > rune-editor.rb << 'EOF'
        class RuneEditor < Formula
          desc "A modern CLI text editor that bridges the gap between nano's simplicity and advanced features"
          homepage "https://github.com/exec/rune"
          version "${{ steps.version.outputs.VERSION }}"
          
          if OS.mac?
            if Hardware::CPU.arm?
              url "https://github.com/exec/rune/releases/download/${{ github.ref_name }}/rune-macos-aarch64.tar.gz"
              sha256 "${{ steps.calculate-sha.outputs.MACOS_AARCH64_SHA }}"
            else
              url "https://github.com/exec/rune/releases/download/${{ github.ref_name }}/rune-macos-x86_64.tar.gz"
              sha256 "${{ steps.calculate-sha.outputs.MACOS_X86_64_SHA }}"
            end
          elsif OS.linux?
            if Hardware::CPU.arm?
              url "https://github.com/exec/rune/releases/download/${{ github.ref_name }}/rune-linux-aarch64.tar.gz"
              sha256 "${{ steps.calculate-sha.outputs.LINUX_AARCH64_SHA }}"
            else
              url "https://github.com/exec/rune/releases/download/${{ github.ref_name }}/rune-linux-x86_64.tar.gz"
              sha256 "${{ steps.calculate-sha.outputs.LINUX_X86_64_SHA }}"
            end
          end

          def install
            bin.install "rune"
          end

          test do
            output = shell_output("#{bin}/rune --help")
            assert_match "A modern CLI text editor", output
          end
        end
        EOF
        
    - name: Commit and push changes
      run: |
        cd homebrew-rune
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add rune-editor.rb
        git commit -m "Update rune-editor formula to ${{ steps.version.outputs.VERSION }}

        Automated update from rune repository release ${{ github.ref_name }}
        
        - macOS x86_64: ${{ steps.calculate-sha.outputs.MACOS_X86_64_SHA }}
        - macOS aarch64: ${{ steps.calculate-sha.outputs.MACOS_AARCH64_SHA }}
        - Linux x86_64: ${{ steps.calculate-sha.outputs.LINUX_X86_64_SHA }}
        - Linux aarch64: ${{ steps.calculate-sha.outputs.LINUX_AARCH64_SHA }}"
        git push

  update-aur:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Calculate source tarball SHA256
      id: calculate-sha
      run: |
        # Download the source tarball
        curl -sL https://github.com/exec/rune/archive/refs/tags/${{ github.ref_name }}.tar.gz -o source.tar.gz
        echo "SOURCE_SHA=$(shasum -a 256 source.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
        
    - name: Setup SSH for AUR
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
        chmod 600 ~/.ssh/aur
        ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts
        
    - name: Clone AUR repository
      run: |
        export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur"
        git clone ssh://aur@aur.archlinux.org/rune-editor.git aur-rune-editor
        
    - name: Update PKGBUILD and .SRCINFO
      run: |
        cd aur-rune-editor
        
        # Update PKGBUILD
        sed -i "s/pkgver=.*/pkgver=${{ steps.version.outputs.VERSION }}/" PKGBUILD
        sed -i "s/sha256sums=.*/sha256sums=('${{ steps.calculate-sha.outputs.SOURCE_SHA }}')/" PKGBUILD
        
        # Generate new .SRCINFO
        makepkg --printsrcinfo > .SRCINFO
        
    - name: Commit and push to AUR
      run: |
        cd aur-rune-editor
        export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur"
        git config user.name "Dylan"
        git config user.email "dylanh@aur.archlinux.org"
        git add PKGBUILD .SRCINFO
        git commit -m "$(cat <<'EOF'
        Update to ${{ steps.version.outputs.VERSION }}

        Automated update from rune repository release ${{ github.ref_name }}
        Source SHA256: ${{ steps.calculate-sha.outputs.SOURCE_SHA }}
        EOF
        )"
        git push